<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Order of the Phoenix</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="app">
    <div id="loginView" class="view active">
      <div class="login-box">
        <h1>Order of the Phoenix</h1>
        <p class="login-sub">Panel de administración</p>
        <form id="loginForm">
          <input type="text" id="loginUser" placeholder="Usuario" required>
          <input type="password" id="loginPass" placeholder="Contraseña" required>
          <p id="loginError" class="error"></p>
          <button type="submit">Ingresar</button>
        </form>
      </div>
    </div>

    <div id="dashboardView" class="view">
      <header>
        <h2>Panel de Administración</h2>
        <div>
          <span id="userName"></span>
          <button id="logoutBtn">Cerrar sesión</button>
        </div>
      </header>
      <main>
        <aside>
          <nav>
            <ul id="sectionList"></ul>
          </nav>
        </aside>
        <section id="editor">
          <h3 id="editorTitle">Selecciona una sección</h3>
          <form id="editorForm" style="display:none">
            <label>Título</label>
            <input type="text" id="editTitle">
            <label>Contenido</label>
            <textarea id="editBody" rows="6"></textarea>
            <label>URL de imagen</label>
            <input type="text" id="editImage">
            <p id="editorMsg" class="msg"></p>
            <button type="submit">Guardar cambios</button>
          </form>
        </section>
      </main>
    </div>
  </div>
  <script src="admin.js"></script>
</body>
</html>
